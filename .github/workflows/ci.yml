name: CI

on:
  workflow_dispatch:
    inputs:
      run_release_bench:
        description: Generate release benchmark artifact
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      benchmark_base_ref:
        description: Optional git ref used as benchmark baseline
        required: false
        default: ""
      benchmark_max_regression_pct:
        description: Maximum allowed benchmark regression percentage
        required: false
        default: "20.00"
      run_release_api_semver:
        description: Run cargo-semver-checks release API gate
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      api_semver_baseline_ref:
        description: Optional git ref used as cargo-semver-checks baseline
        required: false
        default: ""
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  stable:
    name: Stable Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

      - name: Test examples
        run: bash bin/check-examples.sh

      - name: Test without default features
        run: cargo test --locked --no-default-features

      - name: Test all features
        run: cargo test --locked --all-features

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Docs
        run: RUSTDOCFLAGS=-Dwarnings cargo doc --no-deps --document-private-items

      - name: Project contract
        run: bash bin/check-project-contract.sh

      - name: Public API inventory
        run: bash bin/check-public-api-inventory.sh

      - name: Public API semver check
        run: bash bin/check-api-semver.sh

      - name: Release API semver check
        if: github.event_name == 'workflow_dispatch' && inputs.run_release_api_semver == 'true'
        run: bash bin/check-release-api-semver.sh
        env:
          API_SEMVER_REQUIRED: "true"
          API_SEMVER_BASELINE_REF: ${{ inputs.api_semver_baseline_ref }}

      - name: Vstr benchmark smoke
        run: bash bin/check-vstr-benchmark-smoke.sh

      - name: Vstr fuzz smoke
        run: bash bin/check-vstr-fuzz-smoke.sh

  platform-test:
    name: ${{ matrix.os }} Stable Test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

  msrv:
    name: MSRV Rust 1.85
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --locked

      - name: Test
        run: cargo test --locked

  package:
    name: Docs.rs Publish Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Docs.rs readiness
        run: bash bin/check-docs-rs-ready.sh

  release-benchmark:
    name: Release Benchmark Report
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_release_bench == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Generate benchmark reports
        run: bash bin/check-vstr-bench.sh target/vstr-bench-report
        env:
          VSTR_BENCH_BASE_REF: ${{ inputs.benchmark_base_ref }}
          VSTR_BENCH_MAX_REGRESSION_PCT: ${{ inputs.benchmark_max_regression_pct }}

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: vstr-benchmark-report-${{ github.sha }}
          path: target/vstr-bench-report/
          retention-days: 30
